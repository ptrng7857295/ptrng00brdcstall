name: Post Gambar ke 2 Akun Threads

on:
  schedule:
    # Setiap 15 menit   (UTC)
    - cron: '*/15 * * * *'

  # Tombol manual untuk testing
  workflow_dispatch:

jobs:
  post-image:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write   # supaya bisa commit counter.txt balik ke repo

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post gambar ke Threads
        env:
          THREADS_USER_ID_1:      ${{ secrets.THREADS_USER_ID_1 }}
          THREADS_ACCESS_TOKEN_1: ${{ secrets.THREADS_ACCESS_TOKEN_1 }}
          THREADS_USER_ID_2:      ${{ secrets.THREADS_USER_ID_2 }}
          THREADS_ACCESS_TOKEN_2: ${{ secrets.THREADS_ACCESS_TOKEN_2 }}
          IMGBB_API_KEY:          ${{ secrets.IMGBB_API_KEY }}
        run: python post_threads.py

      - name: Commit counter.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add counter.txt
          git diff --staged --quiet || git commit -m "Update rotasi gambar [skip ci]"
          git push

name: Post Gambar ke 2 Akun Threads

on:
  schedule:
    # Setiap 3 jam: 00:00, 03:00, 06:00, 09:00, 12:00, 15:00, 18:00, 21:00 (UTC)
    - cron: '0 */3 * * *'

  # Tombol manual untuk testing
  workflow_dispatch:

jobs:
  post-image:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post gambar ke Threads
        env:
          THREADS_USER_ID_1:      ${{ secrets.THREADS_USER_ID_1 }}
          THREADS_ACCESS_TOKEN_1: ${{ secrets.THREADS_ACCESS_TOKEN_1 }}
          THREADS_USER_ID_2:      ${{ secrets.THREADS_USER_ID_2 }}
          THREADS_ACCESS_TOKEN_2: ${{ secrets.THREADS_ACCESS_TOKEN_2 }}
          IMGBB_API_KEY:          ${{ secrets.IMGBB_API_KEY }}
        run: python post_threads.py
